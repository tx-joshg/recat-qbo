services:
  app:
    build: .
    image: ghcr.io/tx-joshg/recat-qbo:latest
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/recat
      APP_URL: ${APP_URL:-http://localhost:3001}
      PORT: 3001
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID:-}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET:-}
      QBO_ENVIRONMENT: ${QBO_ENVIRONMENT:-sandbox}
      QBO_WEBHOOK_VERIFIER_TOKEN: ${QBO_WEBHOOK_VERIFIER_TOKEN:-}
      QBO_MOCK: ${QBO_MOCK:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Recat <noreply@example.com>}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      DRY_RUN: ${DRY_RUN:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recat
    volumes:
      - recat-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recat"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  recat-pgdata:
